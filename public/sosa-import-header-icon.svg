<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>SOSA Import header icon</title>
  <desc>Icono SVG inspirado en autopartes: tuerca hexagonal, engranaje, pistón y acento rojo.</desc>

  <defs>
    <linearGradient id="metal" x1="126" y1="94" x2="386" y2="418" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B5563"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#6B7280"/>
    </linearGradient>

    <linearGradient id="metalLight" x1="160" y1="130" x2="350" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FAFB"/>
      <stop offset="0.45" stop-color="#D1D5DB"/>
      <stop offset="1" stop-color="#4B5563"/>
    </linearGradient>

    <linearGradient id="piston" x1="262" y1="176" x2="343" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3F4F6"/>
      <stop offset="0.5" stop-color="#6B7280"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Fondo transparente -->

  <!-- Hexágono exterior -->
  <path
    d="M256 42L414 133V315L256 406L98 315V133L256 42Z"
    fill="url(#metal)"
    filter="url(#softShadow)"
  />

  <!-- Corte interno -->
  <path
    d="M256 83L378 154V294L256 365L134 294V154L256 83Z"
    fill="white"
  />

  <!-- Borde interno metálico -->
  <path
    d="M256 101L360 162V286L256 347L152 286V162L256 101Z"
    fill="#F9FAFB"
    stroke="#9CA3AF"
    stroke-width="10"
  />

  <!-- Engranaje simplificado -->
  <g transform="translate(205 226)">
    <path
      d="M-18 -91H18L24 -62C32 -59 40 -56 47 -51L72 -67L97 -42L81 -17C86 -10 90 -2 93 6L122 12V48L93 54C90 62 86 70 81 77L97 102L72 127L47 111C40 116 32 119 24 122L18 151H-18L-24 122C-32 119 -40 116 -47 111L-72 127L-97 102L-81 77C-86 70 -90 62 -93 54L-122 48V12L-93 6C-90 -2 -86 -10 -81 -17L-97 -42L-72 -67L-47 -51C-40 -56 -32 -59 -24 -62L-18 -91Z"
      fill="#111827"
      opacity="0.95"
    />
    <circle cx="0" cy="30" r="73" fill="white"/>
    <circle cx="0" cy="30" r="45" fill="#111827"/>
    <circle cx="0" cy="30" r="24" fill="white"/>
  </g>

  <!-- Pistón -->
  <g>
    <path
      d="M265 150H342V304C342 324 326 340 306 340H265V150Z"
      fill="url(#piston)"
    />
    <path d="M265 150H342V177H265V150Z" fill="#111827"/>
    <path d="M276 193H342" stroke="white" stroke-width="12" stroke-linecap="square" opacity="0.95"/>
    <path d="M276 223H342" stroke="white" stroke-width="12" stroke-linecap="square" opacity="0.95"/>
    <circle cx="305" cy="280" r="37" fill="white" opacity="0.95"/>
    <circle cx="305" cy="280" r="20" fill="#6B7280"/>
    <path d="M324 326L374 384" stroke="#111827" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- Acento rojo lateral -->
  <path
    d="M403 206L449 190L389 333L340 350L403 206Z"
    fill="#DC2626"
  />
  <path
    d="M421 173L449 190L403 206L378 190L421 173Z"
    fill="#991B1B"
  />

  <!-- Brillo superior -->
  <path
    d="M256 42L414 133L389 148L256 72L123 148L98 133L256 42Z"
    fill="white"
    opacity="0.22"
  />
</svg>
